# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - ScopeApi

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: scopebackendregistry.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_C4B670A0664B46B393F0B0E9E52AC7FD }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_EF9C05A317234DE693E4F46228547BE0 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: scopebackendregistry.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_C4B670A0664B46B393F0B0E9E52AC7FD }}/scopebackend:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F3BCD8358BA242159CA50D3AE5BFAF03 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_54340798EF4E46EAA8BDCB43E5F6534A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F7B5EFBB35684A42A4E63FC8AB4DFD06 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'ScopeApi'
          slot-name: 'Production'
          images: 'scopebackendregistry.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_C4B670A0664B46B393F0B0E9E52AC7FD }}/scopebackend:${{ github.sha }}'
          